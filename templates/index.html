<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>高度DXデータ管理システム</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.7/css/dataTables.bootstrap5.min.css">
    <link rel="stylesheet" href="https://cdn.datatables.net/colreorder/1.7.0/css/colReorder.bootstrap5.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        /* 列を掴んでいる時の視覚効果 */
        .dt-columnReorder-moving {
            outline: 2px solid #4c51bf !important;
            background-color: rgba(76, 81, 191, 0.1) !important;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
        <div class="container-fluid px-4">
            <a class="navbar-brand" href="/">
                <strong>DXデータ管理システム</strong> <span class="badge bg-info ms-2">プロ版</span>
            </a>
            <a href="/clear" class="btn btn-outline-danger btn-sm" onclick="return confirm('すべてのデータを削除してリセットしますか？')">データを初期化</a>
        </div>
    </nav>

    <div class="container-fluid px-4">
        <div class="row g-4 mb-4">
            <div class="col-xl-4">
                <div class="card shadow-sm h-100">
                    <div class="card-header">1. CSVファイルの取り込み</div>
                    <div class="card-body d-flex flex-column justify-content-center">
                        <form action="/upload" method="post" enctype="multipart/form-data" class="w-100">
                            <div class="mb-3">
                                <label class="form-label small text-muted">CSVファイルを選択してください</label>
                                <input type="file" name="file" class="form-control" accept=".csv" required>
                            </div>
                            <button type="submit" class="btn btn-primary w-100">インポートを開始する</button>
                        </form>
                    </div>
                </div>
            </div>
            <div class="col-xl-8">
                <div class="card shadow-sm h-100 analysis-panel">
                    <div class="card-header text-white">2. グラフ可視化・分析設定</div>
                    <div class="card-body">
                        <form action="/chart" method="get" target="_blank" class="row g-3">
                            <div class="col-md-4">
                                <label class="form-label small">集計軸（横軸）</label>
                                <select name="label_col" class="form-select" required>
                                    <option value="">項目を選択...</option>
                                    {% for h in headers %}<option value="{{ h }}">{{ h }}</option>{% endfor %}
                                </select>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label small">数値項目（複数選択可）</label>
                                <select name="value_cols" class="form-select" multiple size="2" required>
                                    {% for h in headers %}<option value="{{ h }}">{{ h }}</option>{% endfor %}
                                </select>
                            </div>
                            <div class="col-md-3">
                                <label class="form-label small">グラフの種類</label>
                                <select name="chart_type" class="form-select">
                                    <option value="bar">棒グラフ</option>
                                    <option value="line">折れ線グラフ</option>
                                    <option value="pie">円グラフ</option>
                                    <option value="radar">レーダーチャート</option>
                                </select>
                            </div>
                            <div class="col-md-1 d-flex align-items-end">
                                <button type="submit" class="btn btn-success w-100 fw-bold">分析</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>

        <div class="table-wrapper mb-5">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h5 class="m-0 text-secondary">データエクスプローラー <small class="text-muted" style="font-size: 0.7em;">（ヘッダーをドラッグして列を入れ替え可能）</small></h5>
            </div>
            <table id="mainTable" class="table table-hover w-100">
                <thead>
                    <tr>
                        {% for h in headers %}
                        <th style="cursor: grab;">{{ h }}</th>
                        {% endfor %}
                    </tr>
                </thead>
                <tbody>
                    {% for row in rows %}
                    <tr>
                        {% for h in headers %}
                        <td>{{ row[h] }}</td>
                        {% endfor %}
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.7/js/jquery.dataTables.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.7/js/dataTables.bootstrap5.min.js"></script>
    <script src="https://cdn.datatables.net/colreorder/1.7.0/js/dataTables.colReorder.min.js"></script>

    <script>
        $(document).ready(function() {
            $('#mainTable').DataTable({
                scrollX: true,
                colReorder: true, // 列の入れ替えを有効化
                pageLength: 10,
                language: {
                    "emptyTable": "データがありません",
                    "info": "_TOTAL_ 件中 _START_ から _END_ まで表示",
                    "infoEmpty": " 0 件中 0 から 0 まで表示",
                    "infoFiltered": "（全 _MAX_ 件より抽出）",
                    "lengthMenu": "表示件数: _MENU_",
                    "search": "キーワード検索:",
                    "zeroRecords": "一致するデータが見つかりません",
                    "paginate": { "first": "先頭", "last": "最終", "next": "次へ", "previous": "前へ" }
                },
                dom: "<'row mb-3'<'col-md-6'l><'col-md-6'f>>" + "<'row'<'col-md-12'tr>>" + "<'row mt-3'<'col-md-5'i><'col-md-7'p>>",
            });
        });
    </script>
</body>
</html>
