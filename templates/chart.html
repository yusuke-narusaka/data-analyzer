<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>分析レポート - {{ label_name }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background-color: #f4f7f6; }
        .chart-container {
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        }
        @media print {
            .no-print { display: none; }
        }
    </style>
</head>
<body>
    <div class="container py-5">
        <div class="text-center mb-4">
            <h2 class="fw-bold text-dark">データ分析レポート</h2>
            <p class="text-muted">集計軸: <span class="badge bg-secondary">{{ label_name }}</span></p>
        </div>

        <div class="row justify-content-center">
            <div class="col-lg-10">
                <div class="chart-container">
                    <canvas id="resultChart"></canvas>
                    
                    <div class="mt-4 d-flex justify-content-center gap-3 no-print">
                        <button id="downloadBtn" class="btn btn-primary shadow-sm">
                            <i class="bi bi-download"></i> グラフを画像(PNG)で保存
                        </button>
                        <button onclick="window.print()" class="btn btn-outline-secondary shadow-sm">
                            PDF/印刷用
                        </button>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="text-center mt-5 no-print">
            <button onclick="window.close()" class="btn btn-link text-decoration-none text-muted">ウィンドウを閉じる</button>
        </div>
    </div>

    <script>
        const colors = [
            'rgba(78, 115, 223, 0.7)', 'rgba(28, 200, 138, 0.7)', 
            'rgba(54, 185, 204, 0.7)', 'rgba(246, 194, 62, 0.7)',
            'rgba(231, 74, 59, 0.7)', 'rgba(133, 135, 150, 0.7)'
        ];
        const borderColors = [
            'rgba(78, 115, 223, 1)', 'rgba(28, 200, 138, 1)', 
            'rgba(54, 185, 204, 1)', 'rgba(246, 194, 62, 1)',
            'rgba(231, 74, 59, 1)', 'rgba(133, 135, 150, 1)'
        ];

        const rawDatasets = {{ datasets|tojson }};
        const chartType = '{{ chart_type }}';
        
        const chartDatasets = rawDatasets.map((ds, index) => ({
            label: ds.label,
            data: ds.data,
            backgroundColor: chartType === 'pie' ? colors : colors[index % colors.length],
            borderColor: chartType === 'pie' ? '#fff' : borderColors[index % borderColors.length],
            borderWidth: 1,
            fill: chartType === 'radar'
        }));

        const ctx = document.getElementById('resultChart');
        const myChart = new Chart(ctx, {
            type: chartType,
            data: {
                labels: {{ labels|tojson }},
                datasets: chartDatasets
            },
            options: {
                responsive: true,
                animation: {
                    onComplete: function() {
                        // アニメーション完了後にボタンを有効化（画像化を安定させるため）
                        document.getElementById('downloadBtn').disabled = false;
                    }
                },
                plugins: {
                    legend: { position: 'bottom' }
                },
                scales: {
                    y: { 
                        display: chartType !== 'pie' && chartType !== 'radar',
                        beginAtZero: true 
                    }
                }
            }
        });

        // 画像保存ロジック
        document.getElementById('downloadBtn').addEventListener('click', function() {
            // CanvasをデータURL(PNG)に変換
            const imageAddr = ctx.toDataURL('image/png');
            
            // 仮想のリンクを作ってダウンロードを発火させる
            const link = document.createElement('a');
            link.download = `chart_${new Date().getTime()}.png`;
            link.href = imageAddr;
            link.click();
        });
    </script>
</body>
</html>
