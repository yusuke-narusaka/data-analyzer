<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>データ分析グラフ - DXデータ管理システム</title>
    <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/2103/2103633.png" type="image/png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-light">

<nav class="navbar navbar-dark bg-dark mb-4">
    <div class="container-fluid">
        <a class="navbar-brand" href="/">DXデータ管理システム</a>
        <div class="d-flex">
            <a href="/" class="btn btn-outline-light">データ一覧へ戻る</a>
        </div>
    </div>
</nav>

<div class="container">
    <div class="row">
        <div class="col-md-4">
            <div class="card shadow-sm mb-4">
                <div class="card-body">
                    <h5 class="card-title">グラフ設定</h5>
                    <div class="mb-3">
                        <label class="form-label">集計軸 (X軸)</label>
                        <select id="labelSelect" class="form-select">
                            {% for col in columns %}
                            <option value="{{ col }}">{{ col }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">数値項目 (Y軸・複数選択可)</label>
                        <select id="valueSelect" class="form-select" multiple size="8">
                            {% for col in columns %}
                            <option value="{{ col }}">{{ col }}</option>
                            {% endfor %}
                        </select>
                        <small class="text-muted">Ctrlキーを押しながら複数選択可能</small>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">グラフ形式</label>
                        <select id="typeSelect" class="form-select">
                            <option value="bar">棒グラフ</option>
                            <option value="line">折れ線グラフ</option>
                            <option value="pie">円グラフ</option>
                            <option value="radar">レーダーチャート</option>
                        </select>
                    </div>
                    <button id="updateChart" class="btn btn-primary w-100 mb-2">グラフを更新</button>
                    <button id="downloadChart" class="btn btn-success w-100">画像を保存</button>
                </div>
            </div>
        </div>

        <div class="col-md-8">
            <div class="card shadow-sm">
                <div class="card-body">
                    <canvas id="myChart"></canvas>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
let myChart = null;

async function updateChart() {
    const response = await fetch('/chart_data');
    const data = await response.json();

    if (data.length === 0) return;

    const labelKey = document.getElementById('labelSelect').value;
    const valueKeys = Array.from(document.getElementById('valueSelect').selectedOptions).map(opt => opt.value);
    const chartType = document.getElementById('typeSelect').value;

    const labels = data.map(item => item[labelKey]);
    
    const datasets = valueKeys.map((key, index) => {
        // Y軸が1つの時、各棒の色をバラバラにするための色配列
        const multiColors = data.map((_, i) => `hsla(${(i * 360 / data.length)}, 70%, 60%, 0.7)`);
        const multiBorders = data.map((_, i) => `hsla(${(i * 360 / data.length)}, 70%, 50%, 1)`);

        // 共通の色（複数系列の時用）
        const singleColor = `hsla(${index * 137.5}, 70%, 60%, 0.6)`;
        const singleBorder = `hsla(${index * 137.5}, 70%, 50%, 1)`;

        return {
            label: key,
            data: data.map(item => {
                const val = item[key];
                return isNaN(val) ? 0 : parseFloat(val);
            }),
            // 項目が1つの時はデータごとに色分け、複数の時は系列ごとに色分け
            backgroundColor: valueKeys.length === 1 ? multiColors : singleColor,
            borderColor: valueKeys.length === 1 ? multiBorders : singleBorder,
            borderWidth: 1
        };
    });

    if (myChart) { myChart.destroy(); }

    const ctx = document.getElementById('myChart').getContext('2d');
    myChart = new Chart(ctx, {
        type: chartType,
        data: { labels: labels, datasets: datasets },
        options: {
            responsive: true,
            plugins: { 
                legend: { 
                    display: valueKeys.length > 1, // 1項目の時は凡例を消して見やすく
                    position: 'top' 
                } 
            },
            scales: {
                y: { 
                    beginAtZero: true,
                    ticks: { callback: function(value) { return value.toLocaleString(); } }
                }
            }
        }
    });
}

// イベントリスナー
document.getElementById('updateChart').addEventListener('click', updateChart);

document.getElementById('downloadChart').addEventListener('click', () => {
    const link = document.createElement('a');
    link.download = 'analytics_chart.png';
    link.href = document.getElementById('myChart').toDataURL('image/png');
    link.click();
});

// 初回実行
updateChart();
</script>
</body>
</html>
